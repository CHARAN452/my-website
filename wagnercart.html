```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wagner Cart - Grocery & Household Essentials</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2e7d32;
            --secondary: #4caf50;
            --accent: #ffeb3b;
            --dark: #212121;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: var(--dark);
            background: #f5f5f5;
        }

        header {
            background: var(--primary);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .cart-icon {
            position: relative;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--accent);
            color: var(--dark);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .hero {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            text-align: center;
            padding: 4rem 2rem;
        }

        .categories {
            background: white;
            padding: 2rem;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .category-btn {
            background: white;
            border: 2px solid var(--secondary);
            padding: 1rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
        }

        .products {
            padding: 3rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .products h2,
        #productCount {
            text-align: center;
        }

        #productCount {
            color: gray;
            margin-bottom: 25px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 2rem;
        }

        .product-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .product-image {
            height: 180px;
            overflow: hidden;
            background: #f4f4f4;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .product-info {
            padding: 1rem;
        }

        .product-name {
            font-size: 1.1rem;
            font-weight: bold;
        }

        .product-price {
            color: var(--primary);
            font-size: 1.4rem;
            margin: 10px 0;
        }

        .product-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn {
            flex: 1;
            padding: 0.8rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-primary {
            background: var(--secondary);
            color: white;
        }

        .btn-outline {
            background: white;
            border: 2px solid var(--primary);
            color: var(--primary);
        }
    </style>
</head>
<body>

<header>
    <div class="logo">🛒 Wagner Cart</div>
    <div class="cart-icon">
        🛍️ <span class="cart-count" id="cartCount">0</span>
    </div>
</header>

<section class="hero">
    <h1>Everything You Need</h1>
    <p>Fresh groceries, household essentials & daily needs delivered fast</p>
</section>

<section class="products">
    <h2>Our Products</h2>
    <p id="productCount">5 products available</p>

    <div class="product-grid">

        <div class="product-card">
            <div class="product-image">
                <img src="images/rice.jpg" alt="Rice">
            </div>
            <div class="product-info">
                <div class="product-name">Rice (5kg)</div>
                <div class="product-price">₹250</div>
            </div>
        </div>

        <div class="product-card">
            <div class="product-image">
                <img src="images/wheat-flour.jpg" alt="Wheat Flour">
            </div>
            <div class="product-info">
                <div class="product-name">Wheat Flour (5kg)</div>
                <div class="product-price">₹180</div>
            </div>
        </div>

        <div class="product-card">
            <div class="product-image">
                <img src="images/cooking-oil.jpg" alt="Cooking Oil">
            </div>
            <div class="product-info">
                <div class="product-name">Cooking Oil (1L)</div>
                <div class="product-price">₹140</div>
            </div>
        </div>

        <div class="product-card">
            <div class="product-image">
                <img src="images/sugar.jpg" alt="Sugar">
            </div>
            <div class="product-info">
                <div class="product-name">Sugar (5kg)</div>
                <div class="product-price">₹220</div>
            </div>
        </div>

        <div class="product-card">
            <div class="product-image">
                <img src="images/salt.jpg" alt="Salt">
            </div>
            <div class="product-info">
                <div class="product-name">Salt (1kg)</div>
                <div class="product-price">₹25</div>
            </div>
        </div>

    </div>
</section>

</body>
</html>
```
